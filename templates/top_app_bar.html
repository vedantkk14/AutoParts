<!-- TopAppBar -->
<header
    class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-sm bg-surface sticky top-0 z-40 shadow-sm border-b border-outline-variant">
    <div class="flex items-center gap-md">
        <span
            class="font-headline-sm text-headline-sm-mobile md:text-headline-sm font-bold text-primary">Vaishnavi Sales</span>
    </div>
    <div class="flex items-center gap-md">  
        <!-- <button class="p-sm rounded-full hover:bg-surface-container transition-colors relative">
            <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
            <span class="absolute top-1 right-1 w-2 h-2 bg-error rounded-full"></span>
        </button> -->
        {% if user.is_authenticated %}
        <div class="flex items-center gap-md ml-xs">
            <div class="flex items-center gap-xs bg-surface-container/50 px-sm py-1 rounded-full border border-outline-variant/30">
                <span class="material-symbols-outlined text-[20px] text-primary" data-icon="account_circle">account_circle</span>
                <span class="text-body-md font-semibold text-primary">
                    Welcome, {% if user.full_name %}{{ user.full_name }}{% else %}{{ user.phone_number }}{% endif %}
                </span>
            </div>
            <a href="{% url 'logout' %}" 
               class="flex items-center gap-xs text-body-md font-semibold text-error hover:bg-error-container/10 px-sm py-1 rounded-xl transition-all duration-200" 
               title="Logout">
                <span class="material-symbols-outlined text-[20px]">logout</span>
                <span class="hidden sm:inline">Logout</span>
            </a>
        </div>
        {% endif %}
    </div>
</header>
